<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Evaluation Purpose · LLO 8230</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet" />

<style>
/* ── Brand tokens ──────────────────────────────────────────────── */
:root {
  --vu-black:  #1C1C1C;
  --vu-ink:    #2A2825;
  --vu-cream:  #F5F3EF;
  --vu-paper:  #FBFAF7;
  --vu-sand:   #E0D5C0;
  --vu-gold:   #CFAE70;
  --vu-gold-d: #B49248;
  --vu-oak:    #946E24;
  --vu-rule:   #D8D2C5;
  --vu-muted:  #6F6A60;
  --serif: "Source Serif 4", Georgia, serif;
  --sans:  "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ── Shell ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #1c1c1c;
  overflow: hidden;
  font-family: var(--sans);
}

/* Stage: full viewport, clips the scaled frame */
#stage {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

/* Frame: native 1920×1080 placed at top-left; JS applies translate+scale */
#slide-frame {
  position: absolute;
  top: 0; left: 0;
  width: 1920px; height: 1080px;
  transform-origin: top left;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 6px 20px rgba(0,0,0,0.3);
  background: var(--vu-paper);
  will-change: transform;
}

#app { width: 100%; height: 100%; }

/* ── Worksheet base ────────────────────────────────────────────── */
.ws {
  font-family: var(--sans);
  color: var(--vu-ink);
  background: var(--vu-paper);
  position: relative;
  overflow: hidden;
  width: 100%; height: 100%;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01","ss02","kern";
}
.ws * { box-sizing: border-box; }

/* ── Editable chip ─────────────────────────────────────────────── */
.chip {
  display: inline-flex; align-items: center;
  min-width: 120px; padding: 10px 20px;
  border-radius: 999px;
  background: transparent;
  border: 1.5px solid var(--vu-ink);
  color: var(--vu-ink);
  font-family: var(--sans); font-size: 18px; font-weight: 500;
  line-height: 1.2; letter-spacing: -0.01em;
  cursor: text; outline: none;
  transition: border-color .14s, background .14s, box-shadow .14s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%;
}
.chip:hover { border-color: var(--vu-sand); background: rgba(207,174,112,0.06); }
.chip:focus {
  border-color: var(--vu-gold-d); background: #fff;
  box-shadow: 0 0 0 3px rgba(180,146,72,0.15);
  white-space: normal; overflow: visible; text-overflow: clip;
}
.chip:empty::before {
  content: attr(data-placeholder);
  color: #B7B0A2; font-style: italic; font-weight: 400;
}

/* ── Sentence blank ────────────────────────────────────────────── */
.blank {
  display: inline-block; min-width: 240px;
  padding: 2px 8px 4px; margin: 0 4px;
  border-bottom: 1.5px solid var(--vu-ink);
  color: var(--vu-ink); font-weight: 600;
  cursor: text; outline: none;
  transition: border-color .14s, background .14s;
}
.blank:hover { background: rgba(207,174,112,0.08); }
.blank:focus { border-bottom-color: var(--vu-gold-d); background: rgba(207,174,112,0.12); }
.blank:empty::before {
  content: attr(data-placeholder);
  color: #B7B0A2; font-style: italic; font-weight: 400;
}

/* ── Category toggle chips ─────────────────────────────────────── */
.cat-group { display: flex; flex-wrap: wrap; gap: 10px; }

.cat-chip {
  position: relative;
  display: inline-flex; align-items: center; gap: 9px;
  padding: 11px 18px 11px 14px; border-radius: 999px;
  background: transparent; border: 1.5px solid var(--vu-ink);
  color: var(--vu-ink);
  font-family: var(--sans); font-size: 16px; font-weight: 500;
  letter-spacing: -0.005em; line-height: 1.2;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s, transform .12s;
  -webkit-user-select: none; user-select: none;
}
.cat-chip:hover  { background: rgba(180,146,72,0.10); transform: translateY(-1px); }
.cat-chip:focus  { outline: none; box-shadow: 0 0 0 3px rgba(180,146,72,0.25); }
.cat-chip__dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 1.5px solid var(--vu-ink); background: transparent;
  flex: 0 0 auto; transition: background .15s, border-color .15s, box-shadow .15s;
}
.cat-chip.is-active { background: var(--vu-black); border-color: var(--vu-black); color: var(--vu-cream); }
.cat-chip.is-active .cat-chip__dot {
  background: var(--vu-gold); border-color: var(--vu-gold);
  box-shadow: 0 0 0 2px rgba(207,174,112,0.30);
}
.cat-chip__tip {
  position: absolute; bottom: calc(100% + 10px); left: 0;
  width: 280px; padding: 10px 12px;
  background: var(--vu-black); color: var(--vu-cream);
  font-size: 12.5px; font-weight: 400; line-height: 1.45;
  border-radius: 8px; box-shadow: 0 12px 28px rgba(28,28,28,0.25);
  opacity: 0; pointer-events: none;
  transform: translateY(4px); transition: opacity .14s, transform .14s;
  white-space: normal; z-index: 5;
}
.cat-chip__tip::after {
  content: ""; position: absolute; top: 100%; left: 20px;
  border: 6px solid transparent; border-top-color: var(--vu-black);
}
.cat-chip:hover .cat-chip__tip,
.cat-chip:focus .cat-chip__tip { opacity: 1; transform: translateY(0); }

/* ── Chip list with add/remove ─────────────────────────────────── */
.chip-list { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.chip-wrap { position: relative; display: inline-flex; }
.chip-remove {
  position: absolute; top: -7px; right: -7px;
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--vu-paper);
  background: var(--vu-black); color: var(--vu-cream);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0; opacity: 0; pointer-events: none;
  transition: opacity .12s, transform .12s, background .12s; z-index: 2;
}
.chip-wrap:hover .chip-remove,
.chip-wrap:focus-within .chip-remove { opacity: 1; pointer-events: auto; }
.chip-remove:hover { background: var(--vu-oak); transform: scale(1.12); }

.chip-add {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px 9px 12px; border-radius: 999px;
  background: transparent; border: 1.5px dashed var(--vu-rule);
  color: var(--vu-muted);
  font-family: var(--sans); font-size: 15px; font-weight: 500;
  letter-spacing: -0.005em; cursor: pointer;
  transition: border-color .14s, color .14s, background .14s, border-style .14s;
}
.chip-add__plus {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(207,174,112,0.18); color: var(--vu-oak);
  font-weight: 700; font-size: 15px; line-height: 1;
  transition: background .14s, color .14s;
}
.chip-add:hover {
  border-style: solid; border-color: var(--vu-gold-d);
  color: var(--vu-ink); background: rgba(207,174,112,0.08);
}
.chip-add:hover .chip-add__plus { background: var(--vu-gold-d); color: var(--vu-cream); }
.chip-add:focus { outline: none; box-shadow: 0 0 0 3px rgba(180,146,72,0.20); }

/* ── Export toolbar (outside the slide, never scaled) ──────────── */
#toolbar {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  background: rgba(20,20,20,0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  white-space: nowrap;
}

.tb-label {
  font-family: var(--sans);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  padding: 0 8px 0 4px;
}

.tb-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 15px; border-radius: 999px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.85);
  font-family: var(--sans); font-size: 12.5px; font-weight: 600;
  letter-spacing: 0.02em; cursor: pointer;
  transition: background .14s, color .14s, transform .12s;
}
.tb-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.14); color: #fff; transform: translateY(-1px);
}
.tb-btn:disabled { opacity: 0.45; cursor: wait; }
.tb-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

.tb-sep {
  width: 1px; height: 18px;
  background: rgba(255,255,255,0.12);
  margin: 0 2px;
}
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

<!-- Export libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundled.js"
        crossorigin="anonymous"></script>
</head>
<body>

<div id="stage">
  <div id="slide-frame">
    <div id="app"></div>
  </div>
</div>

<div id="toolbar"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Data ──────────────────────────────────────────────────────── */
const CATEGORIES = [
  { id: "needs",    label: "Needs assessment",
    desc: "The gap between current conditions and desired outcomes. Answers 'what is' vs 'what should be'." },
  { id: "process",  label: "Process evaluation",
    desc: "How a program is operating. Supports decisions about changing or improving program delivery." },
  { id: "outcome",  label: "Outcome evaluation",
    desc: "Whether a program's goals are being met — short-term results (changes in knowledge, skills, behavior)." },
  { id: "impact",   label: "Impact evaluation",
    desc: "Whether long-term, broad changes are happening as a result of a program. Supports high-stakes decisions like continuing or scaling." },
  { id: "economic", label: "Economic evaluation",
    desc: "Assessment of costs associated with a need or a program. Supports decisions about cost effectiveness and cost-benefit analysis." },
];

const DEFAULTS = {
  purposeCategories: [],
  purposeSentence: "",
  users: ["", "", ""],
  uses:  ["", "", ""],
  aim: "",
  ultimately: "",
};

/* ── Persisted state ───────────────────────────────────────────── */
function useWorksheetState() {
  const KEY = "ws.evalPurpose.B";
  const [state, setState] = useState(() => {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) return { ...DEFAULTS, ...JSON.parse(raw) };
    } catch (_) {}
    return { ...DEFAULTS };
  });
  const set = useCallback((patch) => {
    setState(prev => {
      const next = typeof patch === "function" ? patch(prev) : { ...prev, ...patch };
      try { localStorage.setItem(KEY, JSON.stringify(next)); } catch (_) {}
      return next;
    });
  }, []);
  return [state, set];
}

/* ── Editable contenteditable wrapper ─────────────────────────── */
function Editable({ value, onChange, className, placeholder, style, tag = "span", multiline = false }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (el && el.textContent !== value) el.textContent = value || "";
  }, [value]);
  const Tag = tag;
  return (
    <Tag ref={ref} contentEditable suppressContentEditableWarning spellCheck={false}
      className={className} style={style} data-placeholder={placeholder}
      onInput={(e) => onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (!multiline && e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); } }}
    />
  );
}

function Chip({ value, onChange, placeholder, style }) {
  return <Editable value={value} onChange={onChange} className="chip" placeholder={placeholder} style={style} />;
}

function Blank({ value, onChange, placeholder = "fill in…", minWidth = 240, style }) {
  return <Editable value={value} onChange={onChange} className="blank"
                   placeholder={placeholder} style={{ minWidth, ...style }} />;
}

/* ── Editable chip list ────────────────────────────────────────── */
function ChipList({ items, onChange, placeholder, chipStyle, addLabel = "Add", minItems = 1, maxItems = 8 }) {
  const update = (i, v) => onChange(items.map((x, idx) => idx === i ? v : x));
  const remove = (i)    => onChange(items.filter((_, idx) => idx !== i));
  const add    = ()     => onChange([...items, ""]);
  return (
    <div className="chip-list">
      {items.map((v, i) => (
        <span key={i} className="chip-wrap">
          <Chip value={v} placeholder={placeholder(i)} style={chipStyle} onChange={(x) => update(i, x)} />
          {items.length > minItems && (
            <button type="button" className="chip-remove" onClick={() => remove(i)}
                    aria-label={`Remove ${v || "item"}`}>
              <svg viewBox="0 0 10 10" width="10" height="10" aria-hidden="true">
                <path d="M2 2 L8 8 M8 2 L2 8" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" />
              </svg>
            </button>
          )}
        </span>
      ))}
      {items.length < maxItems && (
        <button type="button" className="chip-add" onClick={add}>
          <span className="chip-add__plus" aria-hidden="true">+</span>
          <span>{addLabel}</span>
        </button>
      )}
    </div>
  );
}

/* ── Category toggle group ─────────────────────────────────────── */
function CategoryGroup({ selected, onToggle }) {
  return (
    <div className="cat-group">
      {CATEGORIES.map(cat => {
        const active = selected.includes(cat.id);
        return (
          <button key={cat.id} type="button"
                  className={"cat-chip" + (active ? " is-active" : "")}
                  aria-pressed={active} onClick={() => onToggle(cat.id)}>
            <span className="cat-chip__dot" aria-hidden="true" />
            <span>{cat.label}</span>
            <span className="cat-chip__tip" role="tooltip">{cat.desc}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ── Layout constants ──────────────────────────────────────────── */
const S = {
  root:  { background: "var(--vu-paper)", display: "grid", gridTemplateColumns: "16px 1fr", width: "100%", height: "100%" },
  bar:   { background: "linear-gradient(180deg, var(--vu-gold-d), var(--vu-gold))" },
  inner: { padding: "72px 100px 60px 80px", display: "flex", flexDirection: "column", overflow: "hidden" },

  eyebrow: { display: "flex", alignItems: "center", gap: 14, fontSize: 13, letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--vu-muted)", fontWeight: 700 },
  eyebrowGold: { color: "var(--vu-oak)" },
  title:   { margin: "20px 0 0", fontFamily: "var(--sans)", fontSize: 110, lineHeight: 0.92, letterSpacing: "-0.045em", fontWeight: 700, color: "var(--vu-black)" },
  intro:   { margin: "26px 0 0", maxWidth: 1180, fontSize: 19, lineHeight: 1.55, color: "var(--vu-ink)" },

  body:     { marginTop: 50, flex: 1, display: "flex", flexDirection: "column", gap: 30 },
  section:  { display: "grid", gridTemplateColumns: "110px 1fr", gap: 36, paddingTop: 24, borderTop: "1px solid var(--vu-rule)" },
  numCol:   { fontFamily: "var(--serif)", fontStyle: "italic", fontWeight: 600, color: "var(--vu-gold-d)", fontSize: 64, lineHeight: 1, letterSpacing: "-0.02em" },
  secTitle: { fontFamily: "var(--sans)", fontSize: 22, fontWeight: 700, color: "var(--vu-black)", margin: 0, letterSpacing: "-0.01em" },
  secLead:  { margin: "4px 0 0", fontSize: 17, color: "var(--vu-muted)", lineHeight: 1.4 },
  chipRow:  { display: "flex", flexWrap: "wrap", gap: 12, marginTop: 16 },
  sentence: { margin: "14px 0 0", fontSize: 22, lineHeight: 1.5, color: "var(--vu-ink)" },
  twoUp:    { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 56 },

  finalSection:   { display: "grid", gridTemplateColumns: "110px 1fr", gap: 36, paddingTop: 24, borderTop: "1px solid var(--vu-rule)", marginTop: 24 },
  finalSentence:  { margin: 0, fontSize: 26, lineHeight: 1.55, fontFamily: "var(--sans)", fontWeight: 500, color: "var(--vu-ink)" },

  aside:        { marginTop: 36, padding: "24px 28px", background: "var(--vu-cream)", border: "1px solid var(--vu-sand)", borderLeft: "5px solid var(--vu-gold-d)", borderRadius: 4, display: "grid", gridTemplateColumns: "180px 1fr", gap: 28 },
  asideLabel:   { fontFamily: "var(--serif)", fontStyle: "italic", fontSize: 22, color: "var(--vu-oak)", lineHeight: 1.2 },
  asideCopy:    { margin: 0, fontSize: 15, lineHeight: 1.55, color: "var(--vu-ink)" },
};

const chipOutlined = { background: "transparent", borderColor: "var(--vu-ink)", borderWidth: 1.5, fontWeight: 500 };
const pad2 = (n) => String(n).padStart(2, "0");

/* ── Slide ─────────────────────────────────────────────────────── */
function EvalPurposeSlide() {
  const [s, set] = useWorksheetState();
  const ref = useRef(null);

  useEffect(() => {
    window.__slideEl = ref.current;
    // Re-run the scale calculation once React has painted
    window.dispatchEvent(new Event('resize'));
  }, []);

  const toggleCategory = (id) => set(prev => ({
    ...prev,
    purposeCategories: prev.purposeCategories.includes(id)
      ? prev.purposeCategories.filter(x => x !== id)
      : [...prev.purposeCategories, id],
  }));

  return (
    <div ref={ref} className="ws" style={S.root}>
      <div style={S.bar} />
      <div style={S.inner}>
        <header>
          <div style={S.eyebrow}>
            <span>Vanderbilt Peabody College</span>
            <span style={{ opacity: 0.4 }}>—</span>
            <span style={S.eyebrowGold}>LLO 8230: Program Evaluation</span>
          </div>
          <h1 style={S.title}>Evaluation Purpose.</h1>
          <p style={S.intro}>The evaluation purpose is a brief paragraph that sets the frame for everything that is to come. This template helps to clearly articulate the goals, users, and intended outcomes of the evaluation. It helps us 'keep the end in mind' by encouraging thoughtful consideration of how evaluation results will be applied and what specific actions or decisions they will inform.</p>
        </header>

        <div style={S.body}>
          {/* 01 */}
          <section style={S.section}>
            <div style={S.numCol}>{pad2(1)}</div>
            <div>
              <h2 style={S.secTitle}>Primary purpose</h2>
              <p style={S.secLead}>Select the evaluation type(s) that fit. Hover any chip for its definition.</p>
              <div style={{ marginTop: 14 }}>
                <CategoryGroup selected={s.purposeCategories} onToggle={toggleCategory} />
              </div>
              <p style={S.sentence}>
                The primary purpose of this evaluation is to&nbsp;
                <Blank value={s.purposeSentence} onChange={(x) => set({ purposeSentence: x })}
                       placeholder="full purpose statement" minWidth={640} />.
              </p>
            </div>
          </section>

          {/* 02 */}
          <section style={S.section}>
            <div style={S.numCol}>{pad2(2)}</div>
            <div style={S.twoUp}>
              <div>
                <h2 style={S.secTitle}>Intended users</h2>
                <p style={S.secLead}>The intended users of the evaluation findings are:</p>
                <div style={S.chipRow}>
                  <ChipList items={s.users} onChange={(arr) => set({ users: arr })}
                             placeholder={(i) => `user ${i + 1}`}
                             chipStyle={chipOutlined} addLabel="Add user" />
                </div>
              </div>
              <div>
                <h2 style={S.secTitle}>Use of findings</h2>
                <p style={S.secLead}>These findings will be used to inform decisions or next steps:</p>
                <div style={S.chipRow}>
                  <ChipList items={s.uses} onChange={(arr) => set({ uses: arr })}
                             placeholder={(i) => `use ${i + 1}`}
                             chipStyle={chipOutlined} addLabel="Add use" />
                </div>
              </div>
            </div>
          </section>

          {/* 03 */}
          <section style={S.finalSection}>
            <div style={S.numCol}>{pad2(3)}</div>
            <div>
              <h2 style={S.secTitle}>Near-term aim &amp; ultimate goal</h2>
              <p style={S.finalSentence}>
                By completing this evaluation, we aim to&nbsp;
                <Blank value={s.aim} onChange={(x) => set({ aim: x })}
                       placeholder="near-term aim" minWidth={340} />
                &nbsp;and ultimately to&nbsp;
                <Blank value={s.ultimately} onChange={(x) => set({ ultimately: x })}
                       placeholder="ultimate goal" minWidth={340} />.
              </p>
            </div>
          </section>
        </div>

        <aside style={S.aside}>
          <div style={S.asideLabel}>Operating<br/>Principles</div>
          <p style={S.asideCopy}>
            Consider establishing <b>operating principles</b> to guide the evaluation.
            The principle of <b>utility</b> ensures that the evaluation prioritizes findings that can directly
            guide next steps and that the evaluation sponsors are ready and willing to champion the evaluation
            process. <b>Feasibility</b> ensures that the evaluation can be completed within a reasonable
            timeframe and that appropriate resources are available (or can be made available). Other
            principles may be agreed upon with stakeholders.
          </p>
        </aside>
      </div>
    </div>
  );
}

/* ── Export toolbar ────────────────────────────────────────────── */
function ExportToolbar() {
  const [busy, setBusy] = useState(null);

  const capture = () => {
    const el = window.__slideEl || document.querySelector('.ws');
    return html2canvas(el, {
      width: 1920,
      height: 1080,
      scale: 1.5,          // 2880×1620 — crisp without being huge
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#FBFAF7',
      logging: false,
    });
  };

  const run = (key, fn) => async () => {
    setBusy(key);
    try { await fn(); }
    catch (err) { console.error('Export failed:', err); alert('Export failed — see console for details.'); }
    finally { setBusy(null); }
  };

  const downloadPNG = run('png', async () => {
    const canvas = await capture();
    const a = document.createElement('a');
    a.download = 'Evaluation Purpose Slide.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });

  const downloadPDF = run('pdf', async () => {
    const canvas = await capture();
    const { jsPDF } = window.jspdf;
    // Standard widescreen 16:9 slide dimensions (13.33" × 7.5")
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'in', format: [13.333, 7.5] });
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 13.333, 7.5);
    pdf.save('Evaluation Purpose Slide.pdf');
  });

  const downloadPPTX = run('pptx', async () => {
    const canvas = await capture();
    const pres = new PptxGenJS();
    pres.layout = 'LAYOUT_WIDE';   // 13.33" × 7.5" — matches PowerPoint widescreen
    const slide = pres.addSlide();
    slide.addImage({ data: canvas.toDataURL('image/png'), x: 0, y: 0, w: '100%', h: '100%' });
    await pres.writeFile({ fileName: 'Evaluation Purpose Slide.pptx' });
  });

  const DownloadIcon = () => (
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6"
         strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <path d="M7 2v7M4 6l3 3 3-3M2 11h10" />
    </svg>
  );

  const SpinnerIcon = () => (
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6"
         strokeLinecap="round" aria-hidden="true" style={{ animation: 'spin .8s linear infinite' }}>
      <circle cx="7" cy="7" r="5" strokeDasharray="20 12" />
    </svg>
  );

  const isRendering = !!busy;
  const label = busy ? `Rendering ${busy.toUpperCase()}…` : null;

  return (
    <>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      <span className="tb-label">Export slide</span>
      <div className="tb-sep" />
      <button className="tb-btn" onClick={downloadPNG} disabled={isRendering} title="Save as PNG image">
        {busy === 'png' ? <SpinnerIcon /> : <DownloadIcon />}
        {busy === 'png' ? 'Rendering…' : 'PNG'}
      </button>
      <button className="tb-btn" onClick={downloadPDF} disabled={isRendering} title="Save as PDF document">
        {busy === 'pdf' ? <SpinnerIcon /> : <DownloadIcon />}
        {busy === 'pdf' ? 'Rendering…' : 'PDF'}
      </button>
      <button className="tb-btn" onClick={downloadPPTX} disabled={isRendering} title="Save as PowerPoint (.pptx)">
        {busy === 'pptx' ? <SpinnerIcon /> : <DownloadIcon />}
        {busy === 'pptx' ? 'Rendering…' : 'PPTX'}
      </button>
    </>
  );
}

/* ── Mount ─────────────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById('app')).render(<EvalPurposeSlide />);
ReactDOM.createRoot(document.getElementById('toolbar')).render(<ExportToolbar />);
</script>

<!-- Letterbox scaling: translate+scale from top-left origin (reliable on all viewports) -->
<script>
(function () {
  const frame = document.getElementById('slide-frame');
  const W = 1920, H = 1080;

  function fit() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const s  = Math.min(vw / W, vh / H);
    const tx = Math.round((vw - W * s) / 2);
    const ty = Math.round((vh - H * s) / 2);
    frame.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + s + ')';
  }

  window.addEventListener('resize', fit);
  fit(); // immediate — frame dimensions are set by CSS, no React dependency
})();
</script>

</body>
