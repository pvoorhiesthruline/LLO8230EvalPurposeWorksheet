<style>
  html, body {
    margin: 0; padding: 0;
    background: #1c1c1c;
    overflow: hidden;
    height: 100%;
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  /* Letterboxed stage: 1920×1080 slide scaled to fit any viewport. */
  #stage {
    position: fixed; inset: 0;
    display: grid; place-items: center;
  }
  #slide-frame {
    width: 1920px; height: 1080px;
    transform-origin: center center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 6px 18px rgba(0,0,0,0.25);
    background: #FBFAF7;
    position: relative;
  }
  /* App fills the slide frame */
  #app { width: 100%; height: 100%; }

  /* When printing, the cleanup is handled by styles.css print rules. */
  @media print {
    html, body { background: #fff !important; overflow: visible !important; }
    #stage { position: static !important; display: block !important; }
    #slide-frame { transform: none !important; box-shadow: none !important; width: 100% !important; height: 100% !important; }
  }
</style>

<script type="text/babel">

<script>
  // Scale the 1920×1080 frame to fit whatever window we're in (letterbox).
  (function () {
    const frame = document.getElementById('slide-frame');
    const SLIDE_W = 1920, SLIDE_H = 1080;
    function fit() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const s = Math.min(vw / SLIDE_W, vh / SLIDE_H);
      frame.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();
  })();
</script>
